<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>处方审核规范</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .header h1 { font-size: 1.8em; margin-bottom: 10px; }
        .content { padding: 40px; }
        .section { margin-bottom: 30px; }
        .section h2 {
            color: #0E7490;
            font-size: 1.4em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0E7490;
        }
        .section p { color: #555; line-height: 1.8; margin-bottom: 15px; }
        .check-list { list-style: none; }
        .check-item {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #0E7490;
        }
        .check-icon { font-size: 1.5em; }
        .check-content h3 { color: #333; margin-bottom: 5px; }
        .check-content p { color: #666; margin: 0; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../workflow-guide.html" class="back-btn">← 返回</a>
            <h1>处方审核规范</h1>
            <p>处方合法性、适宜性审核要点及常见问题处理</p>
        </div>
        <div class="content">
            <div class="section">
                <h2>审核内容</h2>
                <ul class="check-list">
                    <li class="check-item">
                        <div class="check-icon">📋</div>
                        <div class="check-content">
                            <h3>合法性审核</h3>
                            <p>审核处方医师是否具有处方权，处方签名是否完整，处方日期是否有效。</p>
                        </div>
                    </li>
                    <li class="check-item">
                        <div class="check-icon">📝</div>
                        <div class="check-content">
                            <h3>规范性审核</h3>
                            <p>审核处方前记、正文、后记是否完整，书写是否规范，字迹是否清晰。</p>
                        </div>
                    </li>
                    <li class="check-item">
                        <div class="check-icon">💊</div>
                        <div class="check-content">
                            <h3>适宜性审核</h3>
                            <p>审核药品选择是否合理，用法用量是否正确，有无配伍禁忌、重复用药等。</p>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
