<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用药咨询服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .header h1 { font-size: 1.8em; margin-bottom: 10px; }
        .content { padding: 40px; }
        .section { margin-bottom: 30px; }
        .section h2 {
            color: #0E7490;
            font-size: 1.4em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0E7490;
        }
        .section p { color: #555; line-height: 1.8; margin-bottom: 15px; }
        .placeholder {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .placeholder-icon { font-size: 48px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="../workflow-guide.html" class="back-btn">← 返回</a>
            <h1>用药咨询服务</h1>
            <p>患者用药教育、医师用药咨询、不良反应处理</p>
        </div>
        <div class="content">
            <div class="placeholder">
                <div class="placeholder-icon">💬</div>
                <h2>内容建设中</h2>
                <p>用药咨询服务内容正在完善中，敬请期待...</p>
            </div>
        </div>
    </div>
</body>
</html>
