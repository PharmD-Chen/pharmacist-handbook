<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海市养志康复医院药品手册 - 药师登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 36px;
        }

        .logo h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .logo .subtitle {
            color: #0E7490;
            font-size: 16px;
            font-weight: 600;
        }

        .logo .version {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0E7490;
        }

        .form-group input::placeholder {
            color: #aaa;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(14, 116, 144, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer p {
            color: #999;
            font-size: 12px;
        }

        .notice {
            background: #f0f9fa;
            border-left: 4px solid #0E7490;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #155E75;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">💊</div>
            <h1>上海市养志康复医院</h1>
            <div class="subtitle">药品手册管理系统</div>
            <div class="version">药师专用版 v2026</div>
        </div>

        <div class="notice">
            本系统仅限药师使用，请输入药师账号和密码登录。
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">药师账号</label>
                <input type="text" id="username" name="username" placeholder="请输入药师账号" required>
            </div>

            <div class="form-group">
                <label for="password">登录密码</label>
                <input type="password" id="password" name="password" placeholder="请输入登录密码" required>
            </div>

            <button type="submit" class="login-btn">药师登录</button>
        </form>

        <div class="footer">
            <p>数据更新于 2026年1月1日</p>
            <p style="margin-top: 5px;">技术支持：医院药学部</p>
        </div>
    </div>

    <script>
        // 药师账号配置（实际项目中应该从服务器验证）
        const PHARMACIST_ACCOUNTS = {
            'pharmacist': { password: '123456', name: '药师' },
            'admin': { password: 'admin123', name: '管理员' }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // 验证账号
            const account = PHARMACIST_ACCOUNTS[username];
            
            if (!account) {
                errorMsg.textContent = '账号不存在，请联系管理员';
                errorMsg.classList.add('show');
                return;
            }
            
            if (account.password !== password) {
                errorMsg.textContent = '密码错误，请重新输入';
                errorMsg.classList.add('show');
                return;
            }
            
            // 登录成功
            const userInfo = {
                type: 'pharmacist',
                name: account.name,
                username: username,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            
            // 跳转到药师主页面
            window.location.href = 'main.html';
        });

        // 清除错误信息
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('show');
        });

        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
