<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药品手册 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }

        .logo h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .user-types {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .user-types h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .user-type-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-type-tag {
            padding: 6px 12px;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
        }

        .user-type-tag.pharmacist {
            background: #e3f2fd;
            color: #1976d2;
        }

        .user-type-tag.doctor {
            background: #e8f5e9;
            color: #388e3c;
        }

        .user-type-tag.nurse {
            background: #fff3e0;
            color: #f57c00;
        }

        .user-type-tag.admin {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .password-hint {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        .password-hint h4 {
            font-size: 13px;
            margin-bottom: 10px;
            color: #333;
        }

        .password-hint table {
            width: 100%;
            border-collapse: collapse;
        }

        .password-hint td {
            padding: 4px 0;
            border-bottom: 1px dotted #ddd;
        }

        .password-hint td:last-child {
            text-align: right;
            font-family: monospace;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">💊</div>
            <h1>药品手册</h1>
            <p>专业药师用药参考系统</p>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="userType">选择身份</label>
                <select id="userType" name="userType" required>
                    <option value="">请选择您的身份</option>
                    <option value="visitor">访客（仅查看基础信息）</option>
                    <option value="nurse">护士</option>
                    <option value="doctor">医生</option>
                    <option value="pharmacist">药师</option>
                    <option value="admin">管理员</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>

        <div class="password-hint">
            <h4>🔑 默认密码（部署后请修改）</h4>
            <table>
                <tr><td>访客</td><td>visitor2024</td></tr>
                <tr><td>护士</td><td>nurse2024</td></tr>
                <tr><td>医生</td><td>doctor2024</td></tr>
                <tr><td>药师</td><td>pharma2024</td></tr>
                <tr><td>管理员</td><td>admin2024</td></tr>
            </table>
        </div>

        <div class="user-types">
            <h3>权限说明</h3>
            <div class="user-type-list">
                <span class="user-type-tag">访客：基础药品信息</span>
                <span class="user-type-tag nurse">护士：+用法用量</span>
                <span class="user-type-tag doctor">医生：+完整手册</span>
                <span class="user-type-tag pharmacist">药师：+岗位手册</span>
                <span class="user-type-tag admin">管理员：所有功能</span>
            </div>
        </div>
    </div>

    <script>
        // 用户配置
        const USER_CONFIG = {
            visitor: {
                password: 'visitor2024',
                permissions: ['basic_info'],
                menuItems: ['drug_search'],
                displayName: '访客'
            },
            nurse: {
                password: 'nurse2024',
                permissions: ['basic_info', 'dosage_info'],
                menuItems: ['drug_search', 'dosage_guide'],
                displayName: '护士'
            },
            doctor: {
                password: 'doctor2024',
                permissions: ['basic_info', 'dosage_info', 'full_manual'],
                menuItems: ['drug_search', 'dosage_guide', 'interactions', 'contraindications'],
                displayName: '医生'
            },
            pharmacist: {
                password: 'pharma2024',
                permissions: ['all'],
                menuItems: ['drug_search', 'dosage_guide', 'interactions', 'contraindications', 'workflow', 'pharmacist_guide'],
                displayName: '药师'
            },
            admin: {
                password: 'admin2024',
                permissions: ['all'],
                menuItems: ['all'],
                displayName: '管理员'
            }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userType = document.getElementById('userType').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // 验证用户类型
            if (!userType) {
                errorMsg.textContent = '请选择您的身份';
                errorMsg.classList.add('show');
                return;
            }
            
            // 验证密码
            const config = USER_CONFIG[userType];
            if (!config || config.password !== password) {
                errorMsg.textContent = '密码错误';
                errorMsg.classList.add('show');
                return;
            }
            
            // 登录成功，存储用户信息
            const userInfo = {
                type: userType,
                username: config.displayName,
                permissions: config.permissions,
                menuItems: config.menuItems,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userInfo', JSON.stringify(userInfo));

            // 跳转到主页面
            window.location.href = 'main.html';
        });

        // 清除错误信息
        document.querySelectorAll('input, select').forEach(input => {
            input.addEventListener('focus', () => {
                document.getElementById('errorMsg').classList.remove('show');
            });
        });
    </script>
</body>
</html>
