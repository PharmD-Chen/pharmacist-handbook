<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>上海市养志康复医院药品手册（2026版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth.js"></script>
    <script src="data/drugs/drugs.js"></script>
    <style>
        @font-face {
            font-family: 'Microsoft YaHei';
            src: local('Microsoft YaHei'), local('微软雅黑');
        }
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(14, 116, 144, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-content {
            flex: 1;
        }
        
        .back-to-home {
            color: white;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: 10px;
            white-space: nowrap;
            opacity: 0.8;
        }
        
        .back-to-home:hover {
            opacity: 1;
            text-decoration: underline;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
        }
        
        .header-subtitle {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 400;
        }
        
        /* 统计栏 */
        .stats-bar {
            background: white;
            padding: 16px 20px;
            display: flex;
            gap: 24px;
            border-bottom: 1px solid #E2E8F0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: fit-content;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #0E7490;
        }
        
        .stat-label {
            font-size: 12px;
            color: #64748B;
            font-weight: 500;
        }
        
        /* 搜索栏 */
        .search-container {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid #E2E8F0;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 44px 14px 48px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: #F8FAFC;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #0E7490;
            background: white;
            box-shadow: 0 0 0 3px rgba(14, 116, 144, 0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 16px;
            font-size: 18px;
            color: #94A3B8;
        }
        
        .clear-btn {
            position: absolute;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #E2E8F0;
            border: none;
            color: #64748B;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .clear-btn.visible {
            display: flex;
        }
        
        /* 药品列表 */
        .drug-list {
            padding: 12px;
            padding-bottom: 100px;
        }
        
        .drug-item {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #F1F5F9;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .drug-item:active {
            transform: scale(0.98);
            background: #F8FAFC;
        }
        
        .drug-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .drug-name {
            font-size: 18px;
            font-weight: 700;
            color: #0F172A;
            line-height: 1.4;
        }
        
        .drug-form {
            font-size: 13px;
            color: #64748B;
            margin-top: 4px;
            font-weight: 500;
        }
        
        .drug-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .tag-甲类 {
            background: #FEF2F2;
            color: #DC2626;
        }
        
        .tag-乙类 {
            background: #F0FDFA;
            color: #0D9488;
        }
        
        .tag-国家基药 {
            background: #FFF7ED;
            color: #EA580C;
        }
        
        .tag-常规供应 {
            background: #F0F9FF;
            color: #0284C7;
        }
        
        .tag-临时采购 {
            background: #FEF2F2;
            color: #DC2626;
        }
        
        .tag-location {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 6px;
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.3);
        }
        
        .drug-specs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        
        .spec-tag {
            background: #F1F5F9;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #475569;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .drug-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #F1F5F9;
        }
        
        .drug-manufacturer {
            font-size: 13px;
            color: #64748B;
        }
        
        .specs-location {
            margin: 8px 0;
            padding: 8px 0;
            border-top: 1px dashed #E2E8F0;
        }
        
        .spec-location-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 12px;
        }
        
        .spec-name {
            color: #475569;
            flex: 1;
        }
        
        .spec-location {
            color: #059669;
            font-weight: 600;
            background: #F0FDF4;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
        }
        
        .favorite-btn:active {
            transform: scale(1.2);
        }
        
        .favorite-btn.active {
            color: #EF4444;
        }
        
        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 20px;
            color: #64748B;
            font-size: 14px;
        }
        
        .load-more-btn {
            background: #0E7490;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .load-more-btn:active {
            transform: scale(0.95);
            background: #155E75;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94A3B8;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 16px;
        }
        
        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 600px;
            background: white;
            z-index: 1001;
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 20px rgba(0,0,0,0.3);
        }
        
        .modal.active {
            transform: translateX(0);
        }
        
        /* 确保弹窗在遮罩层之上 */
        .modal-overlay.active .modal {
            transform: translateX(0);
        }
        
        .modal-header {
            background: linear-gradient(135deg, #0E7490 0%, #155E75 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
            padding-right: 16px;
            line-height: 1.4;
        }
        
        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .modal-close:active {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        
        /* 详情内容样式 */
        .detail-section {
            margin-bottom: 20px;
            background: white;
            border-radius: 12px;
        }
        
        .detail-section-title {
            font-size: 14px;
            font-weight: 700;
            color: #0E7490;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .detail-section-content {
            font-size: 14px;
            color: #334155;
            line-height: 1.6;
            background: #F0FDFA;
            padding: 12px;
            border-radius: 12px;
        }
        
        /* 重要信息样式 */
        .detail-section.important .detail-section-title {
            color: #DC2626;
            font-size: 15px;
            font-weight: 700;
        }
        
        .detail-section.important .detail-section-content {
            background: #FEF2F2;
            border-left: 4px solid #DC2626;
            font-weight: 500;
        }
        
        /* 黑框警示样式 */
        .detail-section.black-box {
            margin-bottom: 20px;
        }
        
        .detail-section.black-box .detail-section-title {
            background: #000000;
            color: #FFFFFF;
            padding: 10px 16px;
            border-radius: 8px 8px 0 0;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0;
        }
        
        .detail-section.black-box .detail-section-content {
            background: #FFFFFF;
            border: 3px solid #000000;
            border-top: none;
            border-radius: 0 0 8px 8px;
            padding: 16px;
            font-weight: 600;
        }
        
        .detail-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .detail-info-item {
            background: #F8FAFC;
            padding: 12px;
            border-radius: 10px;
        }
        
        .detail-info-label {
            font-size: 12px;
            color: #64748B;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        .detail-info-value {
            font-size: 14px;
            color: #0F172A;
            font-weight: 600;
        }
        
        /* 章节头部（可点击） */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 4px 0;
        }
        
        .section-arrow {
            font-size: 20px;
            color: #94A3B8;
            transition: transform 0.2s;
        }
        
        .section-header:active .section-arrow {
            transform: translateX(4px);
        }
        
        /* 章节详情弹窗 */
        .section-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            display: flex;
            align-items: flex-end;
        }
        
        .section-detail-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .section-detail-content {
            background: white;
            width: 100%;
            max-height: 80vh;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }
        
        .section-detail-modal.active .section-detail-content {
            transform: translateY(0);
        }
        
        .section-detail-header {
            padding: 20px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-detail-title {
            font-size: 18px;
            font-weight: 700;
            color: #0F172A;
        }
        
        .section-detail-close {
            background: #F1F5F9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #64748B;
        }
        
        .section-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        
        .section-full-content {
            font-size: 15px;
            line-height: 1.8;
            color: #334155;
        }
        
        .section-full-body {
            white-space: pre-wrap;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: #0E7490;
        }
        
        .nav-item:not(.active) {
            color: #94A3B8;
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748B;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #E2E8F0;
            border-top-color: #0E7490;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-content">
            <div class="header-title">
                <span>上海市养志康复医院药品手册<br>（2026版）</span>
            </div>
            <div class="header-subtitle">药品信息查询系统</div>
        </div>
        <a href="main.html" class="back-to-home" title="返回主界面">← 主界面</a>
    </header>
    
    <!-- 统计栏 -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-label">药品总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="specCount">-</div>
            <div class="stat-label">规格总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="searchCount">-</div>
            <div class="stat-label">搜索次数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="favCount">-</div>
            <div class="stat-label">我的收藏</div>
        </div>
    </div>
    
    <!-- 搜索栏 -->
    <div class="search-container">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索药品名称、拼音或首字母...">
            <button class="clear-btn" id="clearBtn">✕</button>
        </div>
    </div>
    

    
    <!-- 药品列表 -->
    <div class="drug-list" id="drugList">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p style="margin-top: 16px;">正在加载药品数据...</p>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </div>
        <div class="nav-item" data-tab="favorites">
            <span class="nav-icon">⭐</span>
            <span class="nav-label">收藏</span>
        </div>
        <div class="nav-item" data-tab="history">
            <span class="nav-icon">📋</span>
            <span class="nav-label">历史</span>
        </div>
    </nav>
    
    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="drugModal" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">药品详情</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>
    
    <!-- 章节详情弹窗 -->
    <div class="section-detail-modal" id="sectionDetailModal" onclick="closeSectionDetailModal(event)">
        <div class="section-detail-content" onclick="event.stopPropagation()">
            <div class="section-detail-header">
                <div class="section-detail-title" id="sectionDetailTitle">详细内容</div>
                <button class="section-detail-close" onclick="closeSectionDetailModal()">✕</button>
            </div>
            <div class="section-detail-body" id="sectionDetailBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>
    
    <script>
        // 调试功能
        let debugLogs = [];
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            debugLogs.push(logEntry);
            console.log(logEntry);
            updateDebugPanel();
        }
        
        function updateDebugPanel() {
            const panel = document.getElementById('debugPanel');
            if (panel) {
                panel.textContent = debugLogs.join('\n');
            }
        }
        
        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            if (panel) {
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        // 测试搜索功能
        function testSearch() {
            try {
                log('🧪 开始测试搜索...');
                const keyword = '替加环素';
                log(`🔍 搜索关键词: "${keyword}"`);
                
                // 检查 drugIndex
                log(`📊 drugIndex长度: ${drugIndex.length}`);
                
                // 直接搜索
                log('🔎 调用 searchDrugs...');
                const results = searchDrugs(keyword);
                log(`📊 找到 ${results.length} 个结果`);
                
                if (results.length > 0) {
                    log(`✅ 第一个结果: ${results[0].name}`);
                    log('🎨 调用 loadDrugs...');
                    loadDrugs(results);
                    log('🎨 已调用 loadDrugs');
                } else {
                    log('⚠️ 没有找到结果');
                }
            } catch (e) {
                log(`❌ testSearch错误: ${e.message}`);
            }
        }
        
        // 捕获全局错误
        window.onerror = function(msg, url, line, col, error) {
            log(`❌ 错误: ${msg} (行 ${line})`);
            return false;
        };
        
        window.onunhandledrejection = function(event) {
            log(`❌ Promise错误: ${event.reason}`);
        };
        
        // 全局状态
        // drugIndex 从 drugs.js 加载（全局变量）
        let currentPage = 1;
        const pageSize = 20;
        let currentDrugs = [];
        let favorites = JSON.parse(localStorage.getItem('pharmacist_favorites') || '[]');
        let searchHistory = JSON.parse(localStorage.getItem('pharmacist_history') || '[]');
        let currentDrug = null;
        let currentTab = 'home';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 页面加载完成，开始初始化...');
            init();
        });
        
        // 处理浏览器返回按钮（bfcache）
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                log('🔄 从缓存恢复页面，重新初始化...');
                // 检查 drugIndex 是否有效
                if (typeof drugIndex !== 'undefined' && drugIndex.length > 0) {
                    log(`✅ 缓存中 drugIndex 有效，共 ${drugIndex.length} 条`);
                    updateStats();
                    loadDrugs(drugIndex.slice(0, pageSize));
                } else {
                    log('⚠️ 缓存中 drugIndex 无效，重新加载...');
                    init();
                }
            }
        });
        
        async function init() {
            log('⚙️ init() 开始执行');
            
            // 检查 drugIndex 是否已存在（从 drugs.js 加载）
            if (typeof drugIndex !== 'undefined' && drugIndex.length > 0) {
                log(`✅ drugIndex 已存在，共 ${drugIndex.length} 条`);
            } else {
                // 等待 drugs.js 加载完成（最多等待5秒）
                let waitCount = 0;
                while ((typeof drugIndex === 'undefined' || drugIndex.length === 0) && waitCount < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    waitCount++;
                }
                
                if (typeof drugIndex === 'undefined' || drugIndex.length === 0) {
                    log('❌ drugs.js 加载超时');
                    document.getElementById('drugList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⚠️</div>
                            <div class="empty-text">数据加载超时，请刷新重试</div>
                        </div>
                    `;
                    return;
                }
            }
            
            log(`📊 索引加载完成，共 ${drugIndex.length} 条`);
            
            // 更新统计
            log('📈 更新统计信息...');
            updateStats();
            
            // 加载药品列表
            log('📋 开始渲染药品列表...');
            const drugsToShow = drugIndex.slice(0, pageSize);
            log(`🎯 准备显示前 ${drugsToShow.length} 个药品`);
            loadDrugs(drugsToShow);
            log('✅ 药品列表渲染完成');
            
            // 搜索功能
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            
            searchInput.addEventListener('input', function(e) {
                const keyword = e.target.value.trim();
                log(`🔍 搜索输入: "${keyword}"`);
                clearBtn.classList.toggle('visible', keyword.length > 0);
                
                if (keyword) {
                    log(`🔎 执行搜索...`);
                    const results = searchDrugs(keyword);
                    log(`📊 搜索结果: ${results.length} 个`);
                    loadDrugs(results);
                } else {
                    log('🔄 清空搜索，显示首页');
                    currentPage = 1;
                    loadDrugs(drugIndex.slice(0, pageSize));
                }
            });
            
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                clearBtn.classList.remove('visible');
                currentPage = 1;
                loadDrugs(drugIndex.slice(0, pageSize));
            });
            
            // 底部导航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    switchTab(tab);
                });
            });
        }
        
        // 加载药品索引 - 从 drugs.js 获取
        async function loadDrugIndex() {
            // 检查 drugs.js 是否已加载（drugs.js 定义了 const drugIndex）
            if (typeof drugIndex !== 'undefined' && drugIndex.length > 0) {
                log(`✅ 从 drugs.js 加载 ${drugIndex.length} 个药品`);
                return;
            }
            
            // 如果 drugs.js 没有加载，尝试 fetch 方式
            try {
                log('⚠️ drugs.js 未加载，尝试 fetch 方式...');
                const url = 'data/drugs/index.json?v=21';
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const allDrugs = await response.json();
                // 创建全局 drugIndex
                window.drugIndex = allDrugs.filter(drug => drug.status !== '已下架');
                log(`✅ 从 fetch 加载 ${drugIndex.length} 个药品`);
            } catch (error) {
                log(`❌ 加载失败: ${error.message}`);
                window.drugIndex = [];
                document.getElementById('drugList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">加载失败，请刷新重试</div>
                        <div style="font-size: 12px; color: #94A3B8; margin-top: 8px;">${error.message}</div>
                    </div>
                `;
            }
        }
        
        // 加载单个药品详情 - 从 drugs.js 获取
        async function loadDrugDetail(drugId) {
            try {
                // 首先尝试从 drugIndex 中查找
                const drug = drugIndex.find(d => d.id === drugId);
                if (drug && drug.manual) {
                    log(`✅ 从 drugIndex 找到药品 ${drugId}`);
                    return drug;
                }
                
                // 如果找不到，尝试 fetch
                const response = await fetch(`data/drugs/${drugId}.json?v=18`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`❌ 加载药品 ${drugId} 失败:`, error);
                return null;
            }
        }
        
        // 搜索药品
        function searchDrugs(keyword) {
            log(`🔍 searchDrugs("${keyword}") 开始`);
            const lower = keyword.toLowerCase().trim();
            log(`🔤 小写关键词: "${lower}"`);
            
            let matchCount = 0;
            const results = drugIndex.filter(drug => {
                try {
                    // 1. 中文搜索
                    const inChinese = drug.name && drug.name.includes(keyword) ||
                           drug.dosage_form && drug.dosage_form.includes(keyword);
                    
                    // 2. 拼音搜索
                    const inPinyinFull = drug.pinyin && drug.pinyin.includes(lower);
                    const inFormPinyin = drug.dosage_form_pinyin && drug.dosage_form_pinyin.includes(lower);
                    
                    // 3. 首字母搜索
                    const cleanInitials = drug.pinyin_initials ? drug.pinyin_initials.replace(/[※▲]/g, '') : '';
                    const inPinyinInitials = cleanInitials.startsWith(lower);
                    const inFormInitials = drug.dosage_form_initials && drug.dosage_form_initials.startsWith(lower);
                    
                    // 4. 模糊首字母搜索
                    const inFuzzyInitials = cleanInitials.includes(lower);
                    const inFuzzyFormInitials = drug.dosage_form_initials && drug.dosage_form_initials.includes(lower);
                    
                    const matched = inChinese || inPinyinFull || inFormPinyin || inPinyinInitials || inFormInitials || inFuzzyInitials || inFuzzyFormInitials;
                    if (matched) matchCount++;
                    return matched;
                } catch (e) {
                    log(`⚠️ 搜索药品 ${drug.id} 时出错: ${e.message}`);
                    return false;
                }
            });
            
            log(`✅ 搜索完成，匹配 ${matchCount} 个`);
            
            // 添加到搜索历史
            if (keyword && !searchHistory.includes(keyword)) {
                searchHistory.unshift(keyword);
                if (searchHistory.length > 20) searchHistory.pop();
                localStorage.setItem('pharmacist_history', JSON.stringify(searchHistory));
                updateStats();
            }
            
            return results;
        }
        
        // 加载药品列表
        function loadDrugs(drugs) {
            log(`🎨 loadDrugs() 被调用，传入 ${drugs.length} 个药品`);
            currentDrugs = drugs;
            const listEl = document.getElementById('drugList');
            
            if (!listEl) {
                log('❌ 错误: 找不到 drugList 元素');
                return;
            }
            log('✅ 找到 drugList 元素');
            
            if (drugs.length === 0) {
                log('⚠️ 药品列表为空');
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">未找到相关药品</div>
                    </div>
                `;
                return;
            }
            
            log(`📝 开始渲染 ${drugs.length} 个药品...`);
            let html = '';
            for (let i = 0; i < drugs.length; i++) {
                const drug = drugs[i];
                if (i === 0) log(`🧪 渲染第1个药品: ${drug.name}, id=${drug.id}`);
                
                try {
                    // 安全检查
                    if (!drug || typeof drug !== 'object') {
                        log(`⚠️ 药品 ${i} 数据无效`);
                        continue;
                    }
                    
                    const name = drug.name || '未知';
                    const dosageForm = drug.dosage_form || '';
                    const types = Array.isArray(drug.types) ? drug.types : [];
                    const purchaseType = drug.purchase_type || '常规供应';
                    const manufacturers = Array.isArray(drug.manufacturers) ? drug.manufacturers : [];
                    const manufacturer = manufacturers[0] || '';
                    const isFavorite = Array.isArray(favorites) && favorites.includes(drug.id);
                    
                    const typesHtml = types.map(type => `<span class="tag tag-${type}">${type}</span>`).join('');
                    
                    html += `
                <div class="drug-item" onclick="showDrugDetail(${drug.id})">
                    <div class="drug-header">
                        <div>
                            <div class="drug-name">${name}</div>
                            <div class="drug-form">${dosageForm}</div>
                        </div>
                        <div class="drug-tags">
                            ${typesHtml}
                            <span class="tag tag-${purchaseType}">${purchaseType}</span>
                        </div>
                    </div>
                    <div class="drug-footer">
                        <div class="drug-manufacturer">${manufacturer}</div>
                        <button class="favorite-btn ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, ${drug.id})">
                            ${isFavorite ? '❤️' : '🤍'}
                        </button>
                    </div>
                </div>
            `;
                } catch (itemError) {
                    log(`❌ 渲染药品 ${i} 出错: ${itemError.message}`);
                }
            }
            
            log(`🎨 生成HTML长度: ${html.length}`);
            try {
                listEl.innerHTML = html || '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">渲染失败</div></div>';
                log('✅ 药品列表渲染完成');
                log(`📄 当前drugList内容长度: ${listEl.innerHTML.length}`);
                // 保持搜索框可见，不自动滚动
                log('📜 保持当前位置，搜索框保持可见');
            } catch (renderError) {
                log(`❌ 设置innerHTML失败: ${renderError.message}`);
            }
            
            // 添加加载更多按钮
            if (currentTab === 'home' && drugs.length >= pageSize && currentDrugs.length < drugIndex.length) {
                listEl.innerHTML += `
                    <div class="load-more">
                        <button class="load-more-btn" onclick="loadMore()">加载更多</button>
                    </div>
                `;
            }
        }
        
        // 加载更多
        function loadMore() {
            currentPage++;
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const moreDrugs = drugIndex.slice(start, end);
            loadDrugs([...currentDrugs, ...moreDrugs]);
        }
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            
            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.tab === tab);
            });
            
            // 加载对应内容
            if (tab === 'home') {
                currentPage = 1;
                loadDrugs(drugIndex.slice(0, pageSize));
            } else if (tab === 'favorites') {
                const favDrugs = drugIndex.filter(d => favorites.includes(d.id));
                loadDrugs(favDrugs);
            } else if (tab === 'history') {
                // 显示搜索历史
                const listEl = document.getElementById('drugList');
                if (searchHistory.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <div class="empty-text">暂无搜索历史</div>
                        </div>
                    `;
                } else {
                    listEl.innerHTML = `
                        <div style="padding: 20px;">
                            <h3 style="margin-bottom: 16px; color: #0F172A;">搜索历史</h3>
                            ${searchHistory.map(h => `
                                <div style="padding: 12px; background: white; border-radius: 8px; margin-bottom: 8px; cursor: pointer;"
                                     onclick="document.getElementById('searchInput').value='${h}'; searchDrugs('${h}'); loadDrugs(searchDrugs('${h}'));">
                                    🔍 ${h}
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            }
        }

            if (!manual.indications && !manual.dosage) {
                htmlContent += '<div class="empty-state" style="padding: 40px 0;">' +
                    '<div class="empty-icon">📖</div>' +
                    '<div class="empty-text">暂无详细手册数据</div>' +
                '</div>';
            }
            
            log(`📝 生成详情HTML长度: ${htmlContent.length}`);
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = htmlContent;
            log('✅ 已设置modalBody内容');
            const modalOverlay = document.getElementById('drugModal');
            const modal = modalOverlay.querySelector('.modal');
            modalOverlay.classList.add('active');
            modal.style.transform = 'translateX(0)';
            log('✅ 已显示弹窗');
            document.body.style.overflow = 'hidden';
            // 滚动到顶部
            modalBody.scrollTop = 0;
            log('📜 弹窗已滚动到顶部');
        }
        
        // 显示章节完整内容
        function showSectionFullContent(sectionKey, sectionTitle) {
            if (!currentDrug || !currentDrug.manual) return;
            
            const fullKey = 'full_' + sectionKey;
            const content = currentDrug.manual[fullKey] || currentDrug.manual[sectionKey];
            if (!content) return;
            
            document.getElementById('sectionDetailTitle').textContent = currentDrug.name + ' - ' + sectionTitle.replace(/[📋💉⚠️😷🚨📝💊🤰📊] /, '');
            
            let wrapperClass = '';
            let wrapperStyle = '';
            
            if (sectionKey === 'black_box_warning') {
                wrapperStyle = 'style="background: #FEF2F2; border: 2px solid #DC2626; border-radius: 12px; padding: 20px;"';
            } else if (['indications', 'dosage', 'contraindications', 'adverse_reactions', 'precautions'].includes(sectionKey)) {
                wrapperStyle = 'style="background: #FFF7ED; border-left: 4px solid #EA580C; padding: 20px; border-radius: 0 12px 12px 0;"';
            } else {
                wrapperStyle = 'style="background: #F0FDFA; padding: 20px; border-radius: 12px;"';
            }
            
            document.getElementById('sectionDetailBody').innerHTML = `
                <div class="section-full-content">
                    <div ${wrapperStyle}>
                        <div class="section-full-body">${content}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('sectionDetailModal').classList.add('active');
        }
        
        // 关闭弹窗
        function closeModal(event) {
            if (!event || event.target.id === 'drugModal') {
                document.getElementById('drugModal').classList.remove('active');
                document.body.style.overflow = '';
                currentDrug = null;
            }
        }
        
        // 关闭章节详情弹窗
        function closeSectionDetailModal(event) {
            if (!event || event.target.id === 'sectionDetailModal') {
                document.getElementById('sectionDetailModal').classList.remove('active');
            }
        }
        
        // 切换收藏
        function toggleFavorite(event, drugId) {
            event.stopPropagation();
            
            const index = favorites.indexOf(drugId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(drugId);
            }
            
            localStorage.setItem('pharmacist_favorites', JSON.stringify(favorites));
            updateStats();
            
            // 更新按钮状态
            const btn = event.target;
            btn.classList.toggle('active');
            btn.textContent = favorites.includes(drugId) ? '❤️' : '🤍';
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = drugIndex.length;
            document.getElementById('specCount').textContent = drugIndex.reduce((sum, d) => sum + d.spec_count, 0);
            document.getElementById('searchCount').textContent = searchHistory.length;
            document.getElementById('favCount').textContent = favorites.length;
        }
    </script>
</body>
</html>
