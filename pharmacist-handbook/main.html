<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药师工作系统</title>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header h2 {
            font-size: 1.8em;
            font-weight: 500;
            opacity: 0.95;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .module-card {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .module-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }

        .module-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            flex-shrink: 0;
        }

        .module-card.drug-manual .module-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .module-card.workflow-guide .module-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .module-icon span {
            filter: grayscale(1) brightness(2);
        }

        .module-content {
            text-align: left;
            flex: 1;
        }

        .module-content h2 {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .module-content p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }

            .module-card {
                padding: 25px 20px;
                gap: 15px;
            }

            .module-icon {
                width: 60px;
                height: 60px;
                font-size: 2em;
            }

            .module-content h2 {
                font-size: 1.4em;
            }

            .module-content p {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>上海市养志康复医院</h1>
            <h2>药师工作手册</h2>
        </div>
        <div class="modules-grid">
            <a href="index_simple.html" class="module-card drug-manual">
                <div class="module-icon">
                    <span></span>
                </div>
                <div class="module-content">
                    <h2>药品手册</h2>
                    <p>查询药品信息、用法用量、禁忌症等详细内容</p>
                </div>
            </a>

            <a href="departments.html" class="module-card workflow-guide">
                <div class="module-icon">
                    <span></span>
                </div>
                <div class="module-content">
                    <h2>岗位手册</h2>
                    <p>查看各科室工作流程和操作规范</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        console.log('[main.html] Script starting...');
        
        // 检查登录状态
        if (!AuthManager.isLoggedIn()) {
            console.log('[main.html] Not logged in, redirecting to login.html');
            window.location.href = 'login.html';
        } else {
            console.log('[main.html] User is logged in');
        }

        // 获取用户和权限信息
        const user = AuthManager.getCurrentUser();
        const permissions = AuthManager.getCurrentPermissions();
        console.log('[main.html] User:', user?.username, 'Type:', user?.type);

        // 如果不是药师或管理员，隐藏岗位手册入口
        if (user && user.type !== 'pharmacist' && user.type !== 'admin') {
            console.log('[main.html] Hiding workflow guide for non-pharmacist user');
            document.querySelector('.workflow-guide').style.display = 'none';
            // 只有一个模块时，调整布局
            document.querySelector('.modules-grid').style.gridTemplateColumns = '1fr';
            document.querySelector('.modules-grid').style.maxWidth = '400px';
            document.querySelector('.modules-grid').style.margin = '0 auto';
        }

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === '1') {
                window.location.href = 'index_simple.html';
            } else if (e.key === '2' && user && (user.type === 'pharmacist' || user.type === 'admin')) {
                window.location.href = 'departments.html';
            }
        });

        // 页面加载完成后检查用户栏数量
        window.addEventListener('load', function() {
            console.log('[main.html] Window loaded, checking user bars...');
            setTimeout(function() {
                const bars = document.querySelectorAll('#userInfoBar, .user-bar');
                console.log('[main.html] Found', bars.length, 'user bar(s)');
                if (bars.length > 1) {
                    console.log('[main.html] Warning: Multiple user bars found, removing duplicates...');
                    // 保留第一个，删除其他的
                    for (let i = 1; i < bars.length; i++) {
                        bars[i].remove();
                    }
                }
            }, 200);
        });
        
        console.log('[main.html] Script finished');
    </script>
</body>
</html>
